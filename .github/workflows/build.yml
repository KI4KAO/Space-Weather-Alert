name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install --quiet Pillow

      - name: Prepare assets (splash, icons, sound)
        run: python ci/prepare_assets.py

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk "out/Space Weather Alerts.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Space-Weather-Alerts-APK
          path: out/Space Weather Alerts.apk

      - name: Publish rolling release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Space Weather Alerts (latest)
          files: out/Space Weather Alerts.apk
          body: |
            Debug-signed APK. Enable "Install unknown apps" on your device, then sideload.
            Add the home-screen widget and open the app once to start the 60s update cycle.
